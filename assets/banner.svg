<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="claude-thai-skills — 12 skills ภาษาไทยสำหรับ Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d0e"/>
      <stop offset="1" stop-color="#1a1717"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D97757"/>
      <stop offset="1" stop-color="#E8997E"/>
