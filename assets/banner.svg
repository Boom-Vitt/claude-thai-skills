    <rect x="64"  y="244" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="80"  y="265">thai-government-form</text>

    <rect x="268" y="244" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="284" y="265">thai-festival-card</text>

    <rect x="472" y="244" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="488" y="265">thai-pdpa</text>

    <rect x="676" y="244" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="692" y="265">thai-invoice</text>

