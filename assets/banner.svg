  <text x="64" y="158" font-family="ui-sans-serif,system-ui,'Noto Sans Thai','IBM Plex Sans Thai','Sarabun',sans-serif" font-size="22" fill="#A8A29E" letter-spacing="0.2">12 skills · Claude พูดไทยรู้เรื่องขึ้น</text>

