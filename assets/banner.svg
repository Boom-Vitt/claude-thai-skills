    <text x="80"  y="309">thai-id-validate</text>

    <rect x="268" y="288" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="284" y="309">thai-date-format</text>

    <rect x="472" y="288" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
    <text x="488" y="309">thai-address</text>

    <rect x="676" y="288" width="200" height="32" rx="6" fill="#27272A" stroke="#3F3F46"/>
